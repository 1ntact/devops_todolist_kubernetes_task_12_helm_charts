apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{.Chart.Name}}-data
  namespace: {{.Values.namespace}}
spec:
  storageClassName: standard
  persistentVolumeReclaimPolicy: Delete
  accessModes:
    - {{ index .Values.todoapp.pv.accessModes 0 }}
  capacity:
    storage: {{ .Values.todoapp.pv.capacity }}
  hostPath:
    path: /data/
