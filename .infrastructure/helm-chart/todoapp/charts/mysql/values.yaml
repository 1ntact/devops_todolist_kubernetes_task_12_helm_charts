namespace: mysql

image:
  repository: mysql
  tag: 8.0

statefulSet:
  replicas: 2

secrets:
  MYSQL_ROOT_PASSWORD: "1234"
  MYSQL_USER: "app_user="
  MYSQL_PASSWORD: "1234"

resources:
  requests:
    cpu: 500m
    memory: 1Gi

volumeResources:
  requests:
    storage: 2Gi

affinity:
  - key: "app"
    operator: "In"
    values:
      - mysql