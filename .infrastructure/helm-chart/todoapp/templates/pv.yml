apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Chart.Name }}-pv
spec:
  capacity:
    storage: {{ .Values.todoapp.pv.capacity | quote }}
  accessModes:
    {{- toYaml .Values.todoapp.pv.accessModes | nindent 4 }}
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: "/mnt/data/todoapp"