apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Chart.Name }}-pvc
  namespace: {{ .Values.namespace }}
spec:
  accessModes:
    {{- toYaml .Values.todoapp.pvc.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.todoapp.pvc.resources.requests.storage | quote }}
  volumeName: {{ .Chart.Name }}-pv