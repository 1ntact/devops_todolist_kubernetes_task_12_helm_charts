namespace: todoapp

todoapp:
  image:
    name: todoapp
    repository: ikulyk404/todoapp
    version: 4.0.1

  strategy:
    type: RollingUpdate

  resources:
    requests:
      memory: "256Mi"
      cpu: "150m"
    limits:
      memory: "256Mi"
      cpu: "150m"

  nodeaffinity:
    - key: app
      operator: In
      values:
        - kube2py

  secrets:
    SECRET_KEY: QGUyKHl4KXYmdGdoM19zPTB5amEtaSFkcGVieHN6XmRnNDd4KS1rJmtxXzN6Zio5ZSoK
    DB_NAME: "YXBwX2RiCg=="
    DB_USER: "YXBwX3VzZXI="
    DB_PASSWORD: "MTIzNA=="
    DB_HOST: "bXlzcWwtMC5teXNxbC5teXNxbC5zdmMuY2x1c3Rlci5sb2NhbAo="

  env_secrets:
    - name: SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: app-secret
          key: SECRET_KEY
    - name: DB_NAME
      valueFrom:
        secretKeyRef:
          name: app-secret
          key: DB_NAME
    - name: DB_USER
      valueFrom:
        secretKeyRef:
          name: app-secret
          key: DB_USER
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: app-secret
          key: DB_PASSWORD
    - name: DB_HOST
      valueFrom:
        secretKeyRef:
          name: app-secret
          key: DB_HOST

  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    averageCPUUtilization: 70
    averageMemoryUtilization: 70

  pv:
    accessModes:
      - ReadWriteMany
    capacity: 1Gi

  pvc:
    accessModes:
      - ReadWriteMany
    resources:
      requests:
        storage: 1Gi

  serviceAccountName: secrets-reader